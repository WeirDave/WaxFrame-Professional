name: Bug report
description: Something broke or behaved unexpectedly in WaxFrame.
title: "[Bug] "
labels: ["bug", "auto-reported"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! If you came here from the **[Support page](https://waxframe.com/waxframe_techsupport.html)**, your environment is already filled in below. Please add what happened and how to reproduce it, and (if you grabbed one) drag the diagnostic bundle into the issue before posting.

        > Found a **security** problem? Don't open a public issue — use [private vulnerability reporting](https://github.com/WeirDave/WaxFrame-Professional/security/advisories/new) instead.

  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      description: Describe the problem in your own words.
      placeholder: "When I dragged a folder of PDFs into the reference zone, ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that get the problem to happen again.
      placeholder: |
        1. Open WaxFrame and start a new project
        2. On the Reference Material step, drag 6 PDFs from Downloads
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
      placeholder: "All six files should land as cards, with progress visible the whole time."
    validations:
      required: false

  - type: checkboxes
    id: bundle
    attributes:
      label: Diagnostic bundle
      description: Optional but very helpful. Generate one from the support page and drag the file into the issue after posting.
      options:
        - label: I attached a diagnostic bundle to this issue

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Auto-captured from the Support page — leave as-is.
      render: shell
      placeholder: |
        WaxFrame version : v3.x.x Pro
        Build            : 2026...
        ...
    validations:
      required: true
