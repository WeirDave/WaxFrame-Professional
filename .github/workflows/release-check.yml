# ============================================================
# WaxFrame — release-check.yml (v3.63.190)
#
# Runs on every push to main and every pull request targeting main.
# Invokes tools/release-check.mjs to validate:
#   • JS syntax (node --check on every .js file under js/)
#   • Version-stamp consistency (APP_VERSION matches package.json,
#     JSON-LD softwareVersion, every ?v= cache-bust, every
#     waxframe-build meta tag, every // Build: comment)
#   • CSS token references (every var(--TOKEN) in style.css must
#     resolve to a defined token — catches typos like the
#     --space-22 / --modal-w-md mistakes that bit us in v3.63.131)
#   • Cache-bust drift (if style.css or js/*.js changed since the
#     last reachable tag, APP_VERSION must have advanced — catches
#     the v3.63.180-182 failure mode where ?v= got stuck across
#     multiple releases that all shipped CSS/JS)
#
# Fails the build on any inconsistency. Each problem is printed
# with a file path and (when known) a line number, which GitHub
# surfaces inline in the PR diff.
#
# Run the same checks locally before pushing:
#   node tools/release-check.mjs
# ============================================================

name: Release-ceremony validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# v3.63.298 — Explicit least-privilege GITHUB_TOKEN scope so CodeQL alert
# actions/missing-workflow-permissions (#28) closes and the workflow's
# intent is self-documenting. The validator runs `node tools/release-
# check.mjs` against the checked-out tree — read-only over file contents,
# no PR comments, no issue creation, no tag pushes. `contents: read` is
# the minimum the checkout action needs; nothing else is required.
permissions:
  contents: read

jobs:
  validate:
    name: Validate release ceremony
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history + tags so check 4 can locate the last reachable
          # tag and diff style.css / js/*.js against it. Default shallow
          # clone has no tags and would force check 4 into its skip path.
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Match a modern LTS; WaxFrame is plain-script vanilla JS so any
          # current Node will parse it the same way. No npm install — the
          # validator is pure Node stdlib by design (matches the project's
          # "vanilla, no build step" stance).
          node-version: '20'

      - name: Run release-ceremony validator
        run: node tools/release-check.mjs

  # v3.63.341 — Behavior smoke. Closes Codex's Medium-severity "CI validates
  # release ceremony, not app behavior" finding. tools/capture.mjs is a CDP
  # driver that seeds a realistic localStorage + IndexedDB session, loads
  # index.html in headless Chrome, and waits for the work screen to RENDER
  # (a readiness expression confirms the right screen is visible AND its
  # content materialized). The PNG it captures is a side effect — the
  # actual assertion is "did the app boot, parse the seed, and reach a
  # rendered work screen without throwing." A regression in app boot,
  # storage parsing, or work-screen render path fails this with exit 1.
  # --only-work runs a single high-value shot (one theme, work screen)
  # so the smoke finishes in ~30-60s without exploding CI minutes.
  smoke:
    name: Browser behavior smoke (work screen)
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Smoke doesn't need history.
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # 22+ required — tools/capture.mjs uses the built-in WebSocket
          # constructor (no `ws` package, matches project's no-deps stance).
          node-version: '22'

      - name: Locate Chrome binary
        id: chrome
        run: |
          # GitHub's ubuntu-latest runners ship Google Chrome pre-installed.
          # Try the common names + the canonical install path before falling
          # over to apt-installed chromium as a last resort.
          CHROME=""
          for candidate in google-chrome-stable google-chrome chromium-browser chromium; do
            if command -v "$candidate" > /dev/null 2>&1; then
              CHROME=$(command -v "$candidate")
              break
            fi
          done
          if [ -z "$CHROME" ] && [ -x /opt/google/chrome/chrome ]; then
            CHROME=/opt/google/chrome/chrome
          fi
          if [ -z "$CHROME" ]; then
            echo "No Chrome / Chromium binary found on runner — installing chromium-browser"
            sudo apt-get update -qq
            sudo apt-get install -y -qq chromium-browser
            CHROME=$(command -v chromium-browser)
          fi
          echo "Using Chrome at: $CHROME"
          "$CHROME" --version || true
          echo "path=$CHROME" >> "$GITHUB_OUTPUT"

      - name: Run security-surface behavior smoke
        # v3.63.346 — --smoke runs the security-critical shots: work screen,
        # round-history modal, Add Custom AI modal, checkpoint restore. Each
        # is one of the XSS-prone surfaces Codex's review called out. The
        # earlier --only-work alias is still accepted by capture.mjs for
        # back-compat; this step uses the new flag name for clarity.
        run: |
          mkdir -p /tmp/wf-smoke
          node tools/capture.mjs "$PWD" "${{ steps.chrome.outputs.path }}" /tmp/wf-smoke dark --smoke
